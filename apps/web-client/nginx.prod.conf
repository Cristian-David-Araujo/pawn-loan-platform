server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ~ /\. {
    deny all;
    return 404;
  }

  # Block common scanner targets so they never hit SPA fallback.
  location ~* ^/(wp-admin|wp-content|wp-includes|phpmyadmin|\.git|\.svn|\.hg|\.env) {
    return 404;
  }

  # For file-like requests, serve only if the file exists.
  # Missing files should be 404 instead of index.html.
  location ~* \.[a-z0-9]{1,8}$ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

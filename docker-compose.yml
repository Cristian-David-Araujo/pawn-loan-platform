services:
  web-client:
    build:
      context: ./apps/web-client
      dockerfile: Dockerfile
    container_name: pawn-web-client
    env_file:
      - ./.env
    working_dir: /app
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0 --port 5173; else echo 'Missing package.json in /app'; tail -f /dev/null; fi"
    volumes:
      - ./apps/web-client:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${WEB_CLIENT_PORT}:5173"
    depends_on:
      - api-server

  api-server:
    build:
      context: ./apps/api-server
      dockerfile: Dockerfile
    container_name: pawn-api-server
    env_file:
      - ./.env
    working_dir: /app
    command: sh -c "if [ -f pyproject.toml ]; then pip install --no-cache-dir -e . && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload; elif [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload; else echo 'Missing pyproject.toml or requirements.txt in /app'; tail -f /dev/null; fi"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./apps/api-server:/app
    ports:
      - "${API_SERVER_PORT}:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: pawn-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"

volumes:
  postgres_data:

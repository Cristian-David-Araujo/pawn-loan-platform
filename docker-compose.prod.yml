services:
  reverse-proxy:
    image: caddy:2.9-alpine
    container_name: pawn-reverse-proxy
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/digitalocean/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-client
      - api-server

  web-client:
    build:
      context: ./apps/web-client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: pawn-web-client-prod
    restart: unless-stopped

  api-server:
    build:
      context: ./apps/api-server
      dockerfile: Dockerfile.prod
    container_name: pawn-api-server-prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_ROLE: ${ADMIN_ROLE}
      DB_INIT_ON_STARTUP: ${DB_INIT_ON_STARTUP}
      DB_SEED_ON_STARTUP: ${DB_SEED_ON_STARTUP}
      DB_SEED_FORCE: ${DB_SEED_FORCE}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: pawn-postgres-prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

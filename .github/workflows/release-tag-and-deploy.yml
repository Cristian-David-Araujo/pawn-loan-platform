name: Release Tag And Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  release-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Calculate release version from GitFlow branch
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          chmod +x .github/scripts/calculate_version.sh
          ./.github/scripts/calculate_version.sh "$HEAD_REF"

      - name: Show release info
        run: |
          echo "Latest tag: ${{ steps.version.outputs.latest_tag }}"
          echo "Next version: ${{ steps.version.outputs.version }}"
          echo "Next tag: ${{ steps.version.outputs.tag }}"
          echo "Bump kind: ${{ steps.version.outputs.bump_kind }}"

      - name: Check if release tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [[ "$TAG_SHA" != "$MERGE_SHA" ]]; then
              echo "Tag $TAG already exists but points to $TAG_SHA (expected $MERGE_SHA)." >&2
              exit 1
            fi

            echo "Tag $TAG already exists on expected merge commit."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag on merge commit
        if: steps.tag_check.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [[ -z "$MERGE_SHA" ]]; then
            echo "Could not resolve merge commit SHA from pull_request event." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" "$MERGE_SHA" -m "Release $VERSION"
          git push origin "$TAG"

      - name: Validate deployment secrets
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          test -n "$DO_HOST" || (echo "Missing secret: DO_HOST" && exit 1)
          test -n "$DO_USER" || (echo "Missing secret: DO_USER" && exit 1)
          test -n "$DO_SSH_KEY" || (echo "Missing secret: DO_SSH_KEY" && exit 1)

      - name: Deploy merged main on DigitalOcean droplet
        uses: appleboy/ssh-action@v1.2.2
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          envs: RELEASE_TAG
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.DO_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/opt/pawn-loan-platform"
            fi

            cd "$APP_DIR"
            git fetch --all --tags --prune
            git checkout main
            git pull origin main

            docker compose --env-file .env.production -f docker-compose.prod.yml up --build -d

            echo "Deployment completed from tag ${RELEASE_TAG}"

name: PR GitFlow Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

jobs:
  validate-gitflow-main-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch follows GitFlow for main
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "Validating PR source branch: $HEAD_REF"

          if [[ "$HEAD_REF" =~ ^release/ ]] || [[ "$HEAD_REF" =~ ^hotfix/ ]] || [[ "$HEAD_REF" == "develop" ]]; then
            echo "OK: branch is compatible with GitFlow for main."
            exit 0
          fi

          echo "ERROR: PRs to main must come from release/*, hotfix/*, or develop." >&2
          echo "Example valid branches: release/1.4.0, hotfix/1.3.2, develop" >&2
          exit 1

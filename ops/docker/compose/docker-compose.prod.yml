version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  gateway:
    build:
      context: ../../../apps/gateway
    ports:
      - "${GATEWAY_PORT}:8000"
    env_file:
      - ../../../.env
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ../../../apps/frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    env_file:
      - ../../../.env
    depends_on:
      - gateway
    restart: always

volumes:
  postgres_data:
